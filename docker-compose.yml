services:
  postgres:
    image: postgres:16-alpine
    container_name: juno-postgres
    environment:
      POSTGRES_USER: juno
      POSTGRES_PASSWORD: juno
      POSTGRES_DB: juno_brain
    ports:
      - "5432:5432"
    volumes:
      - juno_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U juno -d juno_brain"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  juno_pgdata:
